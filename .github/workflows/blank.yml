
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0b;
    --bg2: #111113;
    --bg3: #18181c;
    --border: #222228;
    --border2: #2e2e38;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --dim: #3a3a48;
    --jotform: #ff6b2b;
    --formstack: #4a9eff;
    --typeform: #c084fc;
    --win: #22c55e;
    --loss: #ef4444;
    --warn: #f59e0b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--win);
    box-shadow: 0 0 8px var(--win);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .topbar-right {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat-chip {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-chip b {
    color: var(--text);
    font-weight: 600;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 49px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    background: var(--bg);
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 0 16px 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }

  .nav-item:hover { background: var(--bg2); }

  .nav-item.active {
    border-left-color: currentColor;
    background: var(--bg2);
  }

  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .nav-name {
    font-weight: 500;
    font-size: 13px;
    flex: 1;
  }

  .nav-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: var(--bg3);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .nav-loss {
    font-family: var(--mono);
    font-size: 9px;
    margin-left: auto;
  }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 12px 16px;
  }

  .sidebar-meta {
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    line-height: 1.8;
  }

  /* MAIN */
  .main { overflow-y: auto; }

  /* OVERVIEW */
  .section { display: none; }
  .section.active { display: block; }

  .page-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
  }

  .page-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .page-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* METRIC ROW */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-bottom: 1px solid var(--border);
  }

  .metric-cell {
    padding: 20px 28px;
    border-right: 1px solid var(--border);
  }

  .metric-cell:last-child { border-right: none; }

  .metric-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 26px;
    font-weight: 600;
    font-family: var(--mono);
    line-height: 1;
    margin-bottom: 4px;
  }

  .metric-sub {
    font-size: 10px;
    color: var(--muted);
  }

  /* COMPETITOR TABLE */
  .table-section {
    padding: 24px 32px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .comp-table {
    width: 100%;
    border-collapse: collapse;
  }

  .comp-table th {
    text-align: left;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    padding: 0 0 10px;
    border-bottom: 1px solid var(--border);
  }

  .comp-table td {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .comp-table tr:last-child td { border-bottom: none; }

  .comp-row { cursor: pointer; transition: background 0.1s; }
  .comp-row:hover td { background: rgba(255,255,255,0.02); }

  .comp-name {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    font-size: 14px;
  }

  .color-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .bar-cell { width: 140px; }

  .bar-wrap {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }

  .bar-pct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    gap: 4px;
  }

  .badge-danger { background: rgba(239,68,68,0.12); color: var(--loss); border: 1px solid rgba(239,68,68,0.2); }
  .badge-warn { background: rgba(245,158,11,0.12); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }
  .badge-ok { background: rgba(34,197,94,0.12); color: var(--win); border: 1px solid rgba(34,197,94,0.2); }

  .tag {
    display: inline-flex;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 10px;
    font-family: var(--mono);
    margin-right: 4px;
    margin-bottom: 3px;
  }

  .chevron {
    color: var(--dim);
    font-size: 14px;
    margin-left: 8px;
  }

  /* BATTLECARD */
  .battlecard {
    padding: 0;
  }

  .bc-header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }

  .bc-title-block { }

  .bc-name {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bc-tagline {
    font-size: 12px;
    color: var(--muted);
    max-width: 320px;
  }

  .bc-kpi {
    text-align: center;
    border-left: 1px solid var(--border);
    padding: 0 28px;
  }

  .bc-kpi-val {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }

  .bc-kpi-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .bc-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .bc-panel {
    padding: 24px 32px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .bc-panel:nth-child(even) { border-right: none; }

  .bc-panel-title {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bc-panel-icon { font-size: 12px; }

  .insight-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .insight-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .insight-marker {
    width: 2px;
    border-radius: 1px;
    flex-shrink: 0;
    align-self: stretch;
    min-height: 16px;
  }

  .insight-text {
    font-size: 12px;
    line-height: 1.6;
    color: #c8c8d8;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .score-label {
    font-size: 11px;
    color: var(--muted);
    width: 120px;
    flex-shrink: 0;
  }

  .score-track {
    flex: 1;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 2px;
  }

  .score-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    width: 24px;
    text-align: right;
  }

  /* RADAR CHART (CSS only) */
  .radar-wrap {
    display: flex;
    justify-content: center;
    padding: 12px 0;
  }

  svg text { font-family: var(--mono); }

  /* DEAL LIST */
  .deal-list {
    padding: 0 32px 32px;
  }

  .deal-item {
    display: grid;
    grid-template-columns: 1fr 140px 110px 90px;
    gap: 16px;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .deal-item:last-child { border-bottom: none; }

  .deal-name { font-weight: 500; font-size: 12px; }

  .deal-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: var(--mono);
  }

  .deal-amount {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
  }

  .deal-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .reason-tag {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 2px;
    background: rgba(239,68,68,0.1);
    color: #f87171;
  }

  /* QUOTE BLOCK */
  .quote-block {
    background: var(--bg2);
    border-left: 2px solid var(--dim);
    padding: 12px 14px;
    border-radius: 0 4px 4px 0;
    margin-bottom: 10px;
  }

  .quote-text {
    font-size: 11px;
    color: #b8b8cc;
    font-style: italic;
    line-height: 1.6;
  }

  .quote-source {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--dim);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ANIMATE IN */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section.active .page-header,
  .section.active .metrics-row,
  .section.active .table-section,
  .section.active .bc-header,
  .section.active .bc-body,
  .section.active .deal-list {
    animation: fadeUp 0.3s ease both;
  }

  /* PATTERNS CALLOUT */
  .patterns-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
  }

  .pattern-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
  }

  .pattern-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pattern-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  .pattern-name {
    font-weight: 600;
    font-size: 12px;
  }

  .pattern-body {
    font-size: 11px;
    color: #a0a0b8;
    line-height: 1.7;
  }

  .highlight { color: var(--text); font-weight: 500; }

</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    COMPETITIVE INTELLIGENCE
  </div>
  <div class="topbar-right">
    <div class="stat-chip">DEALS ANALYZED <b>24</b></div>
    <div class="stat-chip">WINDOW <b>6 MONTHS</b></div>
    <div class="stat-chip" style="color: var(--loss)">CLOSED-LOST</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Competitors</div>

    <div class="nav-item active" style="color: var(--jotform)" onclick="showSection('overview')">
      <div class="nav-dot" style="background:var(--jotform)"></div>
      <span class="nav-name">Overview</span>
    </div>

    <div style="height: 8px"></div>
    <div class="sidebar-label">Battlecards</div>

    <div class="nav-item" style="color: var(--jotform)" onclick="showSection('jotform')">
      <div class="nav-dot" style="background:var(--jotform)"></div>
      <span class="nav-name">Jotform</span>
      <span class="nav-count">9</span>
    </div>

    <div class="nav-item" style="color: var(--formstack)" onclick="showSection('formstack')">
      <div class="nav-dot" style="background:var(--formstack)"></div>
      <span class="nav-name">Formstack</span>
      <span class="nav-count">8</span>
    </div>

    <div class="nav-item" style="color: var(--typeform)" onclick="showSection('typeform')">
      <div class="nav-dot" style="background:var(--typeform)"></div>
      <span class="nav-name">Typeform</span>
      <span class="nav-count">7</span>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Deal Notes</div>

    <div class="nav-item" style="color: var(--muted)" onclick="showSection('deals')">
      <div class="nav-dot" style="background:var(--dim)"></div>
      <span class="nav-name">All Deals</span>
      <span class="nav-count">24</span>
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-meta">
      Source: Salesforce CRM<br>
      + G2 Reviews + Web<br>
      Last pull: Apr 29, 2026
    </div>
  </div>

  <!-- OVERVIEW -->
  <div id="section-overview" class="section main active">
    <div class="page-header">
      <div class="page-title">Closed-Lost Intelligence</div>
      <div class="page-sub">6-month competitor analysis · Jotform / Formstack / Typeform</div>
    </div>

    <div class="metrics-row">
      <div class="metric-cell">
        <div class="metric-label">Total Lost Deals</div>
        <div class="metric-value">24</div>
        <div class="metric-sub">across 3 competitors</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">Pipeline Lost</div>
        <div class="metric-value" style="color:var(--loss)">$614K</div>
        <div class="metric-sub">total ACV at risk</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">Most Frequent Rival</div>
        <div class="metric-value" style="color:var(--jotform)">Jotform</div>
        <div class="metric-sub">9 losses in 6 months</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">Top Loss Reason</div>
        <div class="metric-value" style="font-size:16px; padding-top:4px">Pricing</div>
        <div class="metric-sub">41% of all notes mention it</div>
      </div>
    </div>

    <div class="patterns-grid">
      <div class="pattern-card">
        <div class="pattern-header">
          <div class="pattern-dot" style="background:var(--jotform)"></div>
          <div class="pattern-name" style="color:var(--jotform)">Jotform</div>
        </div>
        <div class="pattern-body">
          Beating us on <span class="highlight">price + template volume</span>. SMB and mid-market accounts cite $34–$99/mo vs our enterprise tiers. Deal notes repeatedly flag their <span class="highlight">10,000+ templates</span> and no-credit-card free tier. Winning in <span class="highlight">edu, nonprofit, and healthcare</span> with 50% discounts.
        </div>
      </div>
      <div class="pattern-card">
        <div class="pattern-header">
          <div class="pattern-dot" style="background:var(--formstack)"></div>
          <div class="pattern-name" style="color:var(--formstack)">Formstack</div>
        </div>
        <div class="pattern-body">
          Winning on <span class="highlight">workflow automation + Salesforce-native</span> positioning. Losses concentrated in ops-heavy and regulated verticals. Notes mention their <span class="highlight">eSignature + document gen</span> bundling as a differentiator. Perceived as more enterprise than us by buyers.
        </div>
      </div>
      <div class="pattern-card">
        <div class="pattern-header">
          <div class="pattern-dot" style="background:var(--typeform)"></div>
          <div class="pattern-name" style="color:var(--typeform)">Typeform</div>
        </div>
        <div class="pattern-body">
          Winning on <span class="highlight">brand + UX prestige</span>. Buyers cite the <span class="highlight">conversational, one-at-a-time UI</span> as justifying the premium. Marketing teams specifically. Their <span class="highlight">AI-powered form logic</span> (2025 upgrade) appears in 3 of 7 deal notes as a differentiator.
        </div>
      </div>
    </div>

    <div class="table-section">
      <div class="section-title">Competitor Summary</div>
      <table class="comp-table">
        <thead>
          <tr>
            <th style="width:160px">Competitor</th>
            <th>Primary Win Reason</th>
            <th style="width:160px">Loss Rate Share</th>
            <th style="width:100px">Threat Level</th>
            <th style="width:100px">G2 Rating</th>
            <th style="width:32px"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="comp-row" onclick="showSection('jotform')">
            <td>
              <div class="comp-name">
                <div class="color-dot" style="background:var(--jotform)"></div>
                Jotform
              </div>
            </td>
            <td>
              <span class="tag" style="background:rgba(255,107,43,0.12); color:var(--jotform)">Price</span>
              <span class="tag" style="background:rgba(255,107,43,0.08); color:rgba(255,107,43,0.7)">Templates</span>
              <span class="tag" style="background:rgba(255,107,43,0.08); color:rgba(255,107,43,0.7)">Free Tier</span>
            </td>
            <td class="bar-cell">
              <div class="bar-wrap"><div class="bar-fill" style="width:37.5%; background:var(--jotform)"></div></div>
              <div class="bar-pct">37.5% · 9 deals</div>
            </td>
            <td><span class="badge badge-danger">HIGH</span></td>
            <td>
              <span style="font-family: var(--mono); font-size: 12px">4.7</span>
              <span style="color: var(--muted); font-size: 10px">/5</span>
            </td>
            <td><span class="chevron">›</span></td>
          </tr>
          <tr class="comp-row" onclick="showSection('formstack')">
            <td>
              <div class="comp-name">
                <div class="color-dot" style="background:var(--formstack)"></div>
                Formstack
              </div>
            </td>
            <td>
              <span class="tag" style="background:rgba(74,158,255,0.12); color:var(--formstack)">Workflow Auto.</span>
              <span class="tag" style="background:rgba(74,158,255,0.08); color:rgba(74,158,255,0.7)">eSign Bundle</span>
            </td>
            <td class="bar-cell">
              <div class="bar-wrap"><div class="bar-fill" style="width:33.3%; background:var(--formstack)"></div></div>
              <div class="bar-pct">33.3% · 8 deals</div>
            </td>
            <td><span class="badge badge-warn">MEDIUM</span></td>
            <td>
              <span style="font-family: var(--mono); font-size: 12px">4.4</span>
              <span style="color: var(--muted); font-size: 10px">/5</span>
            </td>
            <td><span class="chevron">›</span></td>
          </tr>
          <tr class="comp-row" onclick="showSection('typeform')">
            <td>
              <div class="comp-name">
                <div class="color-dot" style="background:var(--typeform)"></div>
                Typeform
              </div>
            </td>
            <td>
              <span class="tag" style="background:rgba(192,132,252,0.12); color:var(--typeform)">UX/Brand</span>
              <span class="tag" style="background:rgba(192,132,252,0.08); color:rgba(192,132,252,0.7)">AI Forms</span>
